<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>RiceFit - จัดการแปลงนา</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css" />
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.js"></script>
  <style>
    * {
      -webkit-tap-highlight-color: transparent;
    }
    body {
      font-family: 'Sarabun', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      overscroll-behavior: none;
    }
    .screen {
      display: none;
      min-height: 100dvh;
    }
    .screen.active {
      display: flex;
      flex-direction: column;
    }
    #map, #preview-map {
      height: 100%;
      width: 100%;
      min-height: 300px;
      z-index: 1;
    }
    .map-container {
      position: relative;
      flex: 1;
      min-height: 0;
    }
    .leaflet-draw-toolbar a {
      background-size: 24px 24px;
    }
    .loading-overlay {
      position: fixed;
      inset: 0;
      background: rgba(255,255,255,0.9);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
    }
    .spinner {
      width: 48px;
      height: 48px;
      border: 4px solid #e5e7eb;
      border-top-color: #22c55e;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .fade-in {
      animation: fadeIn 0.3s ease-out;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body class="bg-gray-50">
  <!-- Loading Overlay -->
  <div id="loading-overlay" class="loading-overlay">
    <div class="text-center">
      <div class="spinner mx-auto mb-4"></div>
      <p class="text-gray-600">กำลังโหลด...</p>
    </div>
  </div>

  <!-- Screen 1: My Farms List -->
  <div id="screen-farms" class="screen bg-gray-50">
    <header class="bg-white border-b border-gray-200 px-4 py-4 sticky top-0 z-10">
      <h1 class="text-xl font-bold text-gray-900">แปลงของฉัน</h1>
      <p class="text-sm text-gray-500 mt-1" id="user-info"></p>
    </header>
    
    <main class="flex-1 overflow-auto p-4 pb-24">
      <div id="farms-list" class="space-y-3"></div>
      <div id="empty-state" class="hidden flex-1 flex flex-col items-center justify-center text-center py-20">
        <div class="w-24 h-24 bg-green-100 rounded-full flex items-center justify-center mb-6">
          <svg class="w-12 h-12 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 3v4M3 5h4M6 17v4m-2-2h4m5-16l2.286 6.857L21 12l-5.714 2.143L13 21l-2.286-6.857L5 12l5.714-2.143L13 3z"></path>
          </svg>
        </div>
        <h2 class="text-xl font-semibold text-gray-900 mb-2">ยังไม่มีแปลงเพาะปลูก</h2>
        <p class="text-gray-500 mb-6">เพิ่มแปลงเพื่อเริ่มใช้งาน</p>
        <button onclick="navigateTo('draw')" class="bg-green-600 text-white px-6 py-3 rounded-xl font-medium shadow-lg shadow-green-600/30 active:scale-95 transition-transform">
          + เพิ่มแปลงแรก
        </button>
      </div>
    </main>
    
    <footer class="fixed bottom-0 left-0 right-0 p-4 bg-white border-t border-gray-200">
      <button onclick="navigateTo('draw')" class="w-full bg-green-600 text-white py-4 rounded-xl font-medium shadow-lg shadow-green-600/30 active:scale-95 transition-transform">
        + เพิ่มแปลงใหม่
      </button>
    </footer>
  </div>

  <!-- Screen 2: Draw Map -->
  <div id="screen-draw" class="screen">
    <header class="bg-white border-b border-gray-200 px-4 py-4 flex items-center gap-3 z-20 relative">
      <button onclick="navigateTo('farms')" class="p-2 -ml-2 rounded-lg hover:bg-gray-100 active:bg-gray-200">
        <svg class="w-6 h-6 text-gray-700" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path>
        </svg>
      </button>
      <h1 class="text-lg font-bold text-gray-900">วาดขอบเขตแปลง</h1>
    </header>
    
    <div class="map-container">
      <div id="map" style="position: absolute; top: 0; left: 0; right: 0; bottom: 0;"></div>
      <div class="absolute top-4 right-4 z-[1000] flex flex-col gap-2">
        <button onclick="clearPolygon()" class="bg-white p-3 rounded-xl shadow-lg active:bg-gray-100 transition-colors">
          <svg class="w-5 h-5 text-gray-700" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path>
          </svg>
        </button>
        <button onclick="getMyLocation()" class="bg-white p-3 rounded-xl shadow-lg active:bg-gray-100 transition-colors">
          <svg class="w-5 h-5 text-gray-700" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"></path>
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"></path>
          </svg>
        </button>
      </div>
      <div id="draw-hint" class="absolute bottom-24 left-4 right-4 z-[1000] bg-white/95 backdrop-blur rounded-xl p-4 shadow-lg text-center">
        <p class="text-gray-700 font-medium">แตะที่แผนที่เพื่อวาดขอบเขตแปลง</p>
        <p class="text-gray-500 text-sm mt-1">วาดอย่างน้อย 3 จุดเพื่อสร้างรูปหลายเหลี่ยม</p>
      </div>
    </div>
    
    <footer class="p-4 bg-white border-t border-gray-200 z-20 relative">
      <button id="btn-next" onclick="proceedToForm()" disabled class="w-full bg-gray-300 text-gray-500 py-4 rounded-xl font-medium transition-all disabled:cursor-not-allowed">
        ต่อไป
      </button>
    </footer>
  </div>

  <!-- Screen 3: Farm Form -->
  <div id="screen-form" class="screen bg-gray-50">
    <header class="bg-white border-b border-gray-200 px-4 py-4 flex items-center gap-3">
      <button onclick="navigateTo('draw')" class="p-2 -ml-2 rounded-lg hover:bg-gray-100 active:bg-gray-200">
        <svg class="w-6 h-6 text-gray-700" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path>
        </svg>
      </button>
      <h1 class="text-lg font-bold text-gray-900" id="form-title">เพิ่มแปลงใหม่</h1>
    </header>
    
    <main class="flex-1 overflow-auto p-4 pb-24">
      <form id="farm-form" class="space-y-5">
        <div class="bg-white rounded-2xl p-4 shadow-sm">
          <label class="block text-sm font-medium text-gray-700 mb-2">ชื่อแปลง</label>
          <input type="text" id="farm-name" required placeholder="เช่น แปลงหลังบ้าน" 
            class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-green-500 focus:border-green-500 outline-none transition-all">
        </div>
        
        <div class="bg-white rounded-2xl p-4 shadow-sm">
          <label class="block text-sm font-medium text-gray-700 mb-2">พันธุ์ข้าว</label>
          <select id="rice-type" required 
            class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-green-500 focus:border-green-500 outline-none transition-all appearance-none bg-white">
            <option value="">เลือกพันธุ์ข้าว</option>
            <option value="KDML105">ข้าวหอมมะลิ 105 (KDML105)</option>
            <option value="RD6">กข6 (RD6)</option>
            <option value="RD15">กข15 (RD15)</option>
            <option value="RD21">กข21 (RD21)</option>
            <option value="RD41">กข41 (RD41)</option>
            <option value="RD47">กข47 (RD47)</option>
            <option value="RD49">กข49 (RD49)</option>
            <option value="CHAINAT1">ชัยนาท 1</option>
            <option value="SUPHANBURI1">สุพรรณบุรี 1</option>
            <option value="OTHER">อื่นๆ</option>
          </select>
        </div>
        
        <div class="bg-white rounded-2xl p-4 shadow-sm">
          <label class="block text-sm font-medium text-gray-700 mb-2">วันที่เพาะปลูก</label>
          <input type="date" id="planting-date" required 
            class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-green-500 focus:border-green-500 outline-none transition-all">
        </div>
        
        <div class="bg-white rounded-2xl p-4 shadow-sm">
          <label class="flex items-center gap-3 cursor-pointer">
            <input type="checkbox" id="is-default" 
              class="w-5 h-5 text-green-600 border-gray-300 rounded focus:ring-green-500">
            <span class="text-gray-700 font-medium">ตั้งเป็นแปลงหลัก</span>
          </label>
        </div>

        <div id="area-info" class="bg-green-50 rounded-2xl p-4 text-center">
          <p class="text-sm text-green-700">พื้นที่แปลง</p>
          <p class="text-2xl font-bold text-green-800 mt-1" id="area-display">0 ไร่</p>
        </div>
      </form>
    </main>
    
    <footer class="fixed bottom-0 left-0 right-0 p-4 bg-white border-t border-gray-200 space-y-2">
      <button onclick="saveFarm()" class="w-full bg-green-600 text-white py-4 rounded-xl font-medium shadow-lg shadow-green-600/30 active:scale-95 transition-transform">
        บันทึก
      </button>
      <button id="btn-delete" onclick="deleteFarm()" class="hidden w-full bg-red-50 text-red-600 py-4 rounded-xl font-medium active:bg-red-100 transition-colors">
        ลบแปลง
      </button>
    </footer>
  </div>

  <!-- Screen 4: Map Preview -->
  <div id="screen-preview" class="screen">
    <header class="bg-white border-b border-gray-200 px-4 py-4 flex items-center gap-3 z-20 relative">
      <button onclick="navigateTo('farms')" class="p-2 -ml-2 rounded-lg hover:bg-gray-100 active:bg-gray-200">
        <svg class="w-6 h-6 text-gray-700" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path>
        </svg>
      </button>
      <h1 class="text-lg font-bold text-gray-900" id="preview-title">แปลงนา</h1>
    </header>
    
    <div class="map-container">
      <div id="preview-map" style="position: absolute; top: 0; left: 0; right: 0; bottom: 0;"></div>
      <div class="absolute bottom-4 left-4 right-4 z-[1000] bg-white/95 backdrop-blur rounded-2xl p-4 shadow-lg">
        <div class="flex items-start justify-between">
          <div>
            <p class="text-sm text-gray-500">พันธุ์ข้าว</p>
            <p class="font-semibold text-gray-900" id="preview-rice-type">-</p>
          </div>
          <div class="text-right">
            <p class="text-sm text-gray-500">วันที่เพาะปลูก</p>
            <p class="font-semibold text-gray-900" id="preview-planting-date">-</p>
          </div>
        </div>
        <div class="mt-3 pt-3 border-t border-gray-200">
          <p class="text-sm text-gray-500">พื้นที่</p>
          <p class="font-semibold text-green-600" id="preview-area">-</p>
        </div>
      </div>
    </div>
    
    <footer class="p-4 bg-white border-t border-gray-200 z-20 relative">
      <button onclick="editCurrentFarm()" class="w-full bg-green-600 text-white py-4 rounded-xl font-medium shadow-lg shadow-green-600/30 active:scale-95 transition-transform">
        แก้ไข
      </button>
    </footer>
  </div>

  <!-- Toast Notification -->
  <div id="toast" class="fixed bottom-24 left-4 right-4 bg-gray-900 text-white px-4 py-3 rounded-xl shadow-lg z-[9999] transform translate-y-20 opacity-0 transition-all duration-300">
    <p id="toast-message" class="text-center"></p>
  </div>

  <script src="/app.js"></script>
</body>
</html>
